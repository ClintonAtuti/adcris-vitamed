{% extends "base.html" %}
{% block content %}

<h2 class="page-title">Our Medical Equipment</h2>

<!-- Search + Filter -->
<div class="filters">
    <form method="GET">
        <input type="text" name="search" placeholder="Search equipment..." value="{{ search_query or '' }}">

        <select name="category">
            <option value="">All Categories</option>
            {% for cat in categories %}
                <option value="{{ cat['category'] }}"
                    {% if selected_category == cat['category'] %}selected{% endif %}>
                    {{ cat['category'] }}
                </option>
            {% endfor %}
        </select>

        <button type="submit" class="btn">Filter</button>
    </form>
</div>

<!-- Product Count -->
<p class="product-count">
    Showing {{ products|length }} equipment item(s)
</p>

<!-- Products Grid -->
<div class="products-grid">
    {% for product in products %}
        <div class="product-card">
            <img src="{{ url_for('static', filename='uploads/' + product['image']) }}"
                 alt="{{ product['name'] }}">

            <h4>{{ product['name'] }}</h4>
            <p>{{ product['description'] }}</p>

            <a href="/contact" class="btn">Request Quote</a>
        </div>
    {% else %}
        <p>No products found.</p>
    {% endfor %}
</div>

{% endblock %}
